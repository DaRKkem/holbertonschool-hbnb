<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBnB - Place Details</title>
  <link rel="icon" href="images/icon.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===== Header ===== -->
  <header>
    <a href="index.html">
      <img src="images/logo.png" alt="HBnB Logo" class="logo">
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
    </nav>
    <a href="login.html" class="login-button" id="login-link">Login</a>
  </header>

  <!-- ===== Main Content ===== -->
  <main>

    <!-- Place details populated dynamically -->
    <div id="place-details">
      <!-- Injected by scripts.js:
           .place-details wrapping div with .place-info grid inside -->
    </div>

    <!-- Reviews populated dynamically -->
    <div id="reviews">
      <!-- .review-card elements injected by scripts.js -->
    </div>

    <!-- Add review section — visible only when logged in -->
    <section id="add-review" class="add-review" style="display: none;">
      <h2>Add a Review</h2>
      <form id="review-form" class="form">
        <label for="review-text">Your review</label>
        <textarea id="review-text" name="review-text" placeholder="Share your experience..." required></textarea>

        <label for="rating">Rating</label>
        <select id="rating" name="rating" required>
          <option value="">Select a rating</option>
          <option value="1">⭐ 1 - Poor</option>
          <option value="2">⭐⭐ 2 - Fair</option>
          <option value="3">⭐⭐⭐ 3 - Good</option>
          <option value="4">⭐⭐⭐⭐ 4 - Very Good</option>
          <option value="5">⭐⭐⭐⭐⭐ 5 - Excellent</option>
        </select>

        <div id="review-message" class="message"></div>

        <button type="submit">Submit Review</button>
      </form>
    </section>

  </main>

  <!-- ===== Footer ===== -->
  <footer>
    <p>&copy; 2025 HBnB. All rights reserved.</p>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
