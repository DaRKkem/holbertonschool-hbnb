<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBnB - Add Review</title>
  <link rel="icon" href="images/icon.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===== Header ===== -->
  <header>
    <a href="index.html">
      <img src="images/logo.png" alt="HBnB Logo" class="logo">
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
    </nav>
    <a href="login.html" class="login-button" id="login-link">Login</a>
  </header>

  <!-- ===== Main Content ===== -->
  <main>
    <div class="review-page-wrapper">

      <!-- Place name populated dynamically -->
      <h1 class="section-title" id="place-name">Add a Review</h1>

      <div class="add-review">
        <h2>Share your experience</h2>
        <form id="review-form" class="form">

          <div id="review-message" class="message"></div>

          <label for="review">Your review</label>
          <textarea id="review" name="review" placeholder="Describe your stay..." required></textarea>

          <label for="rating">Rating</label>
          <select id="rating" name="rating" required>
            <option value="">Select a rating</option>
            <option value="1">⭐ 1 - Poor</option>
            <option value="2">⭐⭐ 2 - Fair</option>
            <option value="3">⭐⭐⭐ 3 - Good</option>
            <option value="4">⭐⭐⭐⭐ 4 - Very Good</option>
            <option value="5">⭐⭐⭐⭐⭐ 5 - Excellent</option>
          </select>

          <button type="submit">Submit Review</button>
        </form>
      </div>

    </div>
  </main>

  <!-- ===== Footer ===== -->
  <footer>
    <p>&copy; 2025 HBnB. All rights reserved.</p>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
